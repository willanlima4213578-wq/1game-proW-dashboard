<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>代号穹顶 · 工作台看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #07090f;
      --bg-card:   #0e1420;
      --border:    rgba(255,255,255,0.07);
      --purple:    #7c3aed;
      --cyan:      #06b6d4;
      --green:     #10b981;
      --amber:     #f59e0b;
      --txt:       #e2e8f0;
      --txt-muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--txt);
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* ── 顶部导航栏 ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 40px;
      background: linear-gradient(135deg, rgba(124,58,237,.12) 0%, rgba(6,182,212,.08) 100%);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(12px);
    }

    .logo { display: flex; align-items: center; gap: 14px; }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--purple), var(--cyan));
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: #fff;
      box-shadow: 0 0 16px rgba(124,58,237,.4);
    }
    .logo-text h1 {
      font-size: 22px; font-weight: 800; letter-spacing: 6px;
      background: linear-gradient(135deg, #c4b5fd, #67e8f9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-text p { font-size: 10px; color: var(--txt-muted); letter-spacing: 3px; margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 12px; }
    #liveClock { font-size: 12px; color: var(--txt-muted); }
    #dataSourceTag { font-size: 11px; }

    .btn-load {
      background: rgba(124,58,237,.18); border: 1px solid rgba(124,58,237,.35);
      color: #c4b5fd; padding: 6px 14px; border-radius: 8px;
      font-size: 12px; cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-load:hover { background: rgba(124,58,237,.32); }

    /* ── 主体 ── */
    main { max-width: 1400px; margin: 0 auto; padding: 28px 40px 60px; }

    /* ── 区块间距 ── */
    .section { margin-bottom: 28px; }

    /* ── 区块标题 ── */
    .section-label {
      font-size: 11px; font-weight: 600; letter-spacing: 3px; color: var(--txt-muted);
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ══════════════════════════════════════════
       抬头信息卡
    ══════════════════════════════════════════ */
    .info-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
      padding: 0 32px; display: flex; align-items: stretch; overflow: hidden; position: relative;
    }
    .info-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--cyan), var(--green));
    }
    .info-block {
      padding: 20px 0; display: flex; flex-direction: column; justify-content: center; gap: 3px;
    }
    .info-block + .info-block { margin-left: 36px; padding-left: 36px; border-left: 1px solid var(--border); }
    .info-lbl { font-size: 10px; color: var(--txt-muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .info-val { font-size: 18px; font-weight: 700; }

    .info-badge {
      margin-left: auto; align-self: center;
      display: flex; align-items: center; gap: 7px;
      background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.22);
      padding: 7px 18px; border-radius: 20px;
      color: #34d399; font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .pulse-dot {
      width: 6px; height: 6px; background: #34d399; border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .3; transform: scale(.65); }
    }

    /* ══════════════════════════════════════════
       第一行：统计总值（3 张数字卡）
    ══════════════════════════════════════════ */
    .summary-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
    }

    .summary-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px 24px; display: flex; align-items: center; gap: 18px;
      position: relative; overflow: hidden;
    }
    .summary-card::before {
      content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 3px;
    }
    .summary-card.s-total::before  { background: var(--cyan); }
    .summary-card.s-avg::before    { background: var(--purple); }
    .summary-card.s-over::before   { background: var(--amber); }

    .summary-icon {
      width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
    }
    .s-total .summary-icon { background: rgba(6,182,212,.12); }
    .s-avg   .summary-icon { background: rgba(124,58,237,.12); }
    .s-over  .summary-icon { background: rgba(245,158,11,.1); }

    .summary-body { display: flex; flex-direction: column; gap: 3px; }
    .summary-lbl { font-size: 11px; color: var(--txt-muted); letter-spacing: 1px; }
    .summary-num {
      font-size: 32px; font-weight: 800; line-height: 1;
    }
    .s-total .summary-num { color: #67e8f9; }
    .s-avg   .summary-num { color: #c4b5fd; }
    .s-over  .summary-num { color: #fcd34d; }
    .summary-sub { font-size: 11px; color: var(--txt-muted); margin-top: 2px; }

    /* ══════════════════════════════════════════
       第二行：总览柱状图
    ══════════════════════════════════════════ */
    .overview-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px 24px;
    }
    .overview-card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .overview-title { font-size: 13px; font-weight: 600; color: var(--txt); }
    .chart-legend { display: flex; align-items: center; gap: 16px; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--txt-muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
    .ld-target { background: rgba(100,116,139,.5); }
    .ld-actual { background: var(--purple); }
    .overview-chart-wrap { height: 200px; position: relative; }

    /* ══════════════════════════════════════════
       第三行：指标详情列表
    ══════════════════════════════════════════ */
    .detail-table {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden;
    }

    .detail-thead {
      display: grid;
      grid-template-columns: 2fr 80px 80px 90px 100px 1fr;
      gap: 0; padding: 11px 24px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid var(--border);
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      color: var(--txt-muted); text-transform: uppercase;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 2fr 80px 80px 90px 100px 1fr;
      gap: 0; padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      align-items: center;
      transition: background .15s;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-row:hover { background: rgba(255,255,255,.025); }

    .row-name { font-size: 14px; font-weight: 600; color: var(--txt); }
    .row-freq { font-size: 11px; color: var(--txt-muted); margin-top: 2px; }

    .row-num {
      font-size: 16px; font-weight: 700;
    }
    .row-num.col-actual { color: #c4b5fd; }
    .row-num.col-target { color: var(--txt-muted); }

    .row-rate { font-size: 15px; font-weight: 800; color: #67e8f9; }

    .row-status {
      display: inline-flex; align-items: center;
      font-size: 11px; font-weight: 700;
      padding: 3px 10px; border-radius: 6px; white-space: nowrap;
    }
    .tag-over { background: rgba(124,58,237,.18); color: #c4b5fd; border: 1px solid rgba(124,58,237,.28); }
    .tag-done { background: rgba(16,185,129,.12); color: #34d399;  border: 1px solid rgba(16,185,129,.25); }

    /* 行内进度条 */
    .row-prog { display: flex; flex-direction: column; gap: 4px; padding-left: 8px; }
    .rprog-bg {
      height: 6px; background: rgba(255,255,255,.06); border-radius: 3px; overflow: hidden;
    }
    .rprog-fill {
      height: 6px; border-radius: 3px;
      transition: width 1.2s cubic-bezier(.22,1,.36,1);
    }
    .rfill-over { background: linear-gradient(90deg, var(--purple), var(--cyan)); }
    .rfill-done { background: linear-gradient(90deg, var(--green), #34d399); }
    .rprog-label { font-size: 10px; color: var(--txt-muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">穹</div>
    <div class="logo-text">
      <h1>代号穹顶</h1>
      <p>OPERATION DOME · DASHBOARD</p>
    </div>
  </div>
  <div class="header-right">
    <span id="liveClock"></span>
    <span id="dataSourceTag"></span>
    <span id="autoTag" style="font-size:11px;display:none;"></span>
    <button class="btn-load" id="btnPick" title="选择 Board.csv，之后自动轮询更新">
      绑定 CSV · 自动更新
    </button>
    <button class="btn-load" id="btnStop"
            style="display:none;background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#fca5a5;"
            title="停止自动更新">停止</button>
  </div>
</header>

<main>

  <!-- ── 抬头信息卡 ── -->
  <div class="section">
    <div class="info-card" id="infoCard">
      <div class="info-block">
        <span class="info-lbl">岗位</span>
        <span class="info-val" id="v-position">制作人</span>
      </div>
      <div class="info-block">
        <span class="info-lbl">项目 / 组</span>
        <span class="info-val" id="v-project">1game / proW</span>
      </div>
      <div class="info-block">
        <span class="info-lbl">直属组长</span>
        <span class="info-val" id="v-leader">k</span>
      </div>
      <div class="info-block">
        <span class="info-lbl">填写日期</span>
        <span class="info-val" id="v-date">2026 / 4 / 1</span>
      </div>
      <div class="info-badge">
        <div class="pulse-dot"></div>
        数据运行中
      </div>
    </div>
  </div>

  <!-- ── 第一行：统计总值 ── -->
  <div class="section">
    <div class="section-label">统计总览 · SUMMARY</div>
    <div class="summary-row" id="summaryRow">
      <div class="summary-card s-total">
        <div class="summary-icon">📋</div>
        <div class="summary-body">
          <span class="summary-lbl">指标总数</span>
          <span class="summary-num" id="s-total">—</span>
          <span class="summary-sub">个核心 KPI</span>
        </div>
      </div>
      <div class="summary-card s-avg">
        <div class="summary-icon">📈</div>
        <div class="summary-body">
          <span class="summary-lbl">平均完成率</span>
          <span class="summary-num" id="s-avg">—</span>
          <span class="summary-sub">全部指标均值</span>
        </div>
      </div>
      <div class="summary-card s-over">
        <div class="summary-icon">🏆</div>
        <div class="summary-body">
          <span class="summary-lbl">超额完成指标</span>
          <span class="summary-num" id="s-over">—</span>
          <span class="summary-sub" id="s-over-sub">个 / — 个</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 第二行：总览柱状图 ── -->
  <div class="section">
    <div class="section-label">目标 vs 完成 · OVERVIEW</div>
    <div class="overview-card">
      <div class="overview-card-header">
        <span class="overview-title">所有指标目标值与实际完成值对比</span>
        <div class="chart-legend">
          <div class="legend-item"><div class="legend-dot ld-target"></div>目标值</div>
          <div class="legend-item"><div class="legend-dot ld-actual"></div>实际完成</div>
        </div>
      </div>
      <div class="overview-chart-wrap">
        <canvas id="overviewChart"></canvas>
      </div>
    </div>
  </div>

  <!-- ── 第三行：指标详情 ── -->
  <div class="section">
    <div class="section-label">指标详情 · DETAIL</div>
    <div class="detail-table">
      <div class="detail-thead">
        <div>指标名称</div>
        <div>目标值</div>
        <div>实际完成</div>
        <div>完成率</div>
        <div>状态</div>
        <div style="padding-left:8px">完成进度</div>
      </div>
      <div id="detailBody"></div>
    </div>
  </div>

</main>

<script>
// ─────────────────────────────────────────────────────────────
//  内嵌默认数据（来自 Board.csv GBK 解码）
// ─────────────────────────────────────────────────────────────
const DEFAULT_HEADER = {
  position: '制作人', project: '1game / proW', leader: 'k', date: '2026 / 4 / 1'
};
const DEFAULT_METRICS = [
  { name: '需求文档完成数',     target: 15, actual: 28, rate: '187%', status: '超额完成', freq: '周更新' },
  { name: '立绘反馈完成数',     target: 15, actual: 82, rate: '547%', status: '超额完成', freq: '周更新' },
  { name: 'Demo 测试完成数',    target:  3, actual: 14, rate: '467%', status: '超额完成', freq: '周更新' },
  { name: '资料学习完成数',     target:  3, actual:  4, rate: '133%', status: '超额完成', freq: '周更新' },
  { name: '竞品体验完成数',     target:  3, actual:  3, rate: '100%', status: '完成',     freq: '周更新' },
  { name: '会议记录整理完成数', target:  8, actual:  8, rate: '100%', status: '完成',     freq: '周更新' },
];

// ─────────────────────────────────────────────────────────────
//  CSV 解析
// ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).map(l => l.split(','));
  const row14 = lines[13] || [];
  const header = {
    position: (row14[0] || '').trim() || DEFAULT_HEADER.position,
    project:  (row14[1] || '').trim() || DEFAULT_HEADER.project,
    leader:   (row14[2] || '').trim() || DEFAULT_HEADER.leader,
    date:     (row14[3] || '').trim() || DEFAULT_HEADER.date,
  };
  const metrics = [];
  for (let i = 17; i <= 22; i++) {
    const r = lines[i] || [];
    const target = parseInt(r[4]) || 0;
    const actual = parseInt(r[5]) || 0;
    const rateRaw = (r[6] || '').trim();
    const rate = rateRaw || (target > 0 ? Math.round(actual / target * 100) + '%' : '—');
    metrics.push({
      name:   (r[0] || DEFAULT_METRICS[i - 17].name).trim(),
      target, actual, rate,
      status: (r[7] || '').trim() || (actual >= target ? '完成' : '进行中'),
      freq:   (r[8] || '').trim() || '周更新',
    });
  }
  return { header, metrics };
}

// ─────────────────────────────────────────────────────────────
//  渲染
// ─────────────────────────────────────────────────────────────
let overviewChart = null;

function renderDashboard({ header, metrics }) {
  // 抬头卡
  document.getElementById('v-position').textContent = header.position;
  document.getElementById('v-project').textContent  = header.project;
  document.getElementById('v-leader').textContent   = header.leader;
  document.getElementById('v-date').textContent     = header.date;

  // ── 统计总值 ──
  const total    = metrics.length;
  const rates    = metrics.map(m => parseInt(m.rate) || 0);
  const avgRate  = Math.round(rates.reduce((a, b) => a + b, 0) / total);
  const overList = metrics.filter(m => m.status.includes('超额') || parseInt(m.rate) > 100);
  const overCnt  = overList.length;

  document.getElementById('s-total').textContent    = total;
  document.getElementById('s-avg').textContent      = avgRate + '%';
  document.getElementById('s-over').textContent     = overCnt;
  document.getElementById('s-over-sub').textContent = `个 / ${total} 个`;

  // ── 总览柱状图 ──
  if (overviewChart) overviewChart.destroy();

  const ctx = document.getElementById('overviewChart').getContext('2d');
  overviewChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: metrics.map(m => m.name),
      datasets: [
        {
          label: '目标值',
          data: metrics.map(m => m.target),
          backgroundColor: 'rgba(100,116,139,.3)',
          borderColor:     'rgba(100,116,139,.55)',
          borderWidth: 1,
          borderRadius: 5,
          borderSkipped: false,
        },
        {
          label: '实际完成',
          data: metrics.map(m => m.actual),
          backgroundColor: metrics.map(m =>
            (m.status.includes('超额') || parseInt(m.rate) > 100)
              ? 'rgba(124,58,237,.7)' : 'rgba(16,185,129,.65)'
          ),
          borderColor: metrics.map(m =>
            (m.status.includes('超额') || parseInt(m.rate) > 100) ? '#7c3aed' : '#10b981'
          ),
          borderWidth: 1,
          borderRadius: 5,
          borderSkipped: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          borderColor: 'rgba(255,255,255,.1)', borderWidth: 1,
          titleColor: '#94a3b8', bodyColor: '#e2e8f0', padding: 10,
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: '#64748b', font: { size: 11 } },
        },
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: '#64748b', font: { size: 11 }, maxTicksLimit: 5 },
          beginAtZero: true,
        }
      },
      animation: { duration: 900, easing: 'easeOutQuart' }
    }
  });

  // ── 指标详情列表 ──
  const body = document.getElementById('detailBody');
  body.innerHTML = '';

  metrics.forEach(m => {
    const isOver    = m.status.includes('超额') || parseInt(m.rate) > 100;
    const tagClass  = isOver ? 'tag-over' : 'tag-done';
    const fillClass = isOver ? 'rfill-over' : 'rfill-done';
    const rateNum   = parseInt(m.rate) || 0;
    // 进度条：以最大实际完成率的比例来映射，避免全部 100%
    const maxRate   = Math.max(...rates, 100);
    const fillPct   = Math.min(rateNum / maxRate * 100, 100);

    const row = document.createElement('div');
    row.className = 'detail-row';
    row.innerHTML = `
      <div>
        <div class="row-name">${m.name}</div>
        <div class="row-freq">${m.freq}</div>
      </div>
      <div class="row-num col-target">${m.target}</div>
      <div class="row-num col-actual">${m.actual}</div>
      <div class="row-rate">${m.rate}</div>
      <div><span class="row-status ${tagClass}">${m.status}</span></div>
      <div class="row-prog">
        <div class="rprog-bg">
          <div class="rprog-fill ${fillClass}" style="width:0%"
               data-fill="${fillPct.toFixed(1)}"></div>
        </div>
        <div class="rprog-label">${m.actual} / ${m.target}</div>
      </div>
    `;
    body.appendChild(row);
  });

  // 进度条动画
  requestAnimationFrame(() => {
    document.querySelectorAll('.rprog-fill').forEach(el => {
      el.style.width = el.dataset.fill + '%';
    });
  });
}

// ─────────────────────────────────────────────────────────────
//  数据来源提示
// ─────────────────────────────────────────────────────────────
function setSourceTag(text, color) {
  const el = document.getElementById('dataSourceTag');
  el.textContent = text;
  el.style.color = color || 'var(--txt-muted)';
}

function loadFromText(text, sourceName) {
  try {
    renderDashboard(parseCSV(text));
    setSourceTag('来源：' + sourceName + '  ✓', '#34d399');
  } catch (err) {
    setSourceTag('解析失败，已使用内嵌数据', '#f87171');
    renderDashboard({ header: DEFAULT_HEADER, metrics: DEFAULT_METRICS });
  }
}

// ─────────────────────────────────────────────────────────────
//  File System Access API · 自动轮询
// ─────────────────────────────────────────────────────────────
const POLL_INTERVAL = 30;   // 秒，每次重新读取文件的间隔

let fileHandle      = null;
let pollTimer       = null;
let countdownTimer  = null;
let secondsLeft     = POLL_INTERVAL;

const btnPick  = document.getElementById('btnPick');
const btnStop  = document.getElementById('btnStop');
const autoTag  = document.getElementById('autoTag');

async function readFromHandle() {
  if (!fileHandle) return;
  const file = await fileHandle.getFile();
  const buf  = await file.arrayBuffer();
  let text;
  try { text = new TextDecoder('gbk').decode(buf); }
  catch (_) { text = new TextDecoder('utf-8').decode(buf); }
  loadFromText(text, file.name);
}

function startPolling() {
  secondsLeft = POLL_INTERVAL;
  autoTag.style.display = 'inline';
  btnStop.style.display = 'inline';
  btnPick.textContent   = '重新绑定';

  // 每 30s 重新读取
  pollTimer = setInterval(async () => {
    await readFromHandle();
    secondsLeft = POLL_INTERVAL;
  }, POLL_INTERVAL * 1000);

  // 每 1s 更新倒计时
  countdownTimer = setInterval(() => {
    secondsLeft--;
    autoTag.textContent = `自动更新 ${secondsLeft}s 后`;
    autoTag.style.color = '#64748b';
    if (secondsLeft <= 0) secondsLeft = POLL_INTERVAL;
  }, 1000);
}

function stopPolling() {
  clearInterval(pollTimer);
  clearInterval(countdownTimer);
  clearInterval(fetchPollTimer);
  pollTimer = countdownTimer = fetchPollTimer = null;
  autoTag.style.display = 'none';
  btnStop.style.display = 'none';
  btnPick.textContent   = '绑定 CSV · 自动更新';
  fileHandle = null;
  setSourceTag('已停止监听', '#64748b');
}

btnPick.addEventListener('click', async () => {
  // 不支持 File System Access API 时降级
  if (!window.showOpenFilePicker) {
    fallbackInput.click();
    return;
  }
  try {
    [fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'CSV 文件', accept: { 'text/csv': ['.csv'] } }],
      multiple: false,
    });
    stopPolling();                // 重置旧的定时器
    await readFromHandle();       // 立刻读取一次
    startPolling();               // 启动轮询
  } catch (e) {
    // 用户取消，不做任何操作
  }
});

btnStop.addEventListener('click', stopPolling);

// ─────────────────────────────────────────────────────────────
//  降级方案（不支持 File System Access API 的浏览器）
// ─────────────────────────────────────────────────────────────
const fallbackInput = document.createElement('input');
fallbackInput.type   = 'file';
fallbackInput.accept = '.csv';
fallbackInput.style.display = 'none';
document.body.appendChild(fallbackInput);

fallbackInput.addEventListener('change', function () {
  const file = this.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    let text;
    try { text = new TextDecoder('gbk').decode(ev.target.result); }
    catch (_) { text = new TextDecoder('utf-8').decode(ev.target.result); }
    loadFromText(text, file.name);
    setSourceTag('来源：' + file.name + '（手动，无自动更新）', '#f59e0b');
  };
  reader.readAsArrayBuffer(file);
  this.value = '';
});

// ─────────────────────────────────────────────────────────────
//  初始化：自动 fetch('./data.csv')（HTTP 服务模式下可用）
//  成功后启动 fetch 轮询；file:// 协议下回退提示手动绑定
// ─────────────────────────────────────────────────────────────
let fetchPollTimer = null;

function fetchDataCSV() {
  return fetch('./data.csv?_=' + Date.now())   // 加时间戳防缓存
    .then(r => { if (!r.ok) throw 0; return r.arrayBuffer(); })
    .then(buf => {
      let text;
      try { text = new TextDecoder('gbk').decode(buf); }
      catch (_) { text = new TextDecoder('utf-8').decode(buf); }
      loadFromText(text, 'data.csv');
    });
}

(function init() {
  fetchDataCSV()
    .then(() => {
      // HTTP 模式：每 30s 自动 fetch 刷新
      fetchPollTimer = setInterval(fetchDataCSV, POLL_INTERVAL * 1000);
      autoTag.style.display = 'inline';
      autoTag.textContent   = '自动更新已开启';
      autoTag.style.color   = '#34d399';
    })
    .catch(() => {
      // file:// 模式：回退内嵌数据，提示手动绑定
      renderDashboard({ header: DEFAULT_HEADER, metrics: DEFAULT_METRICS });
      setSourceTag('内嵌数据 · 点击「绑定 CSV」开启自动更新', '#f59e0b');
    });
})();

// 实时时钟
function updateClock() {
  const now = new Date(), p = n => String(n).padStart(2,'0');
  document.getElementById('liveClock').textContent =
    `${now.getFullYear()}/${p(now.getMonth()+1)}/${p(now.getDate())}  ${p(now.getHours())}:${p(now.getMinutes())}:${p(now.getSeconds())}`;
}
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
